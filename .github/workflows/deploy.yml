name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test "test/*.test.js"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Stage site files
        run: |
          mkdir dist
          rsync -a --exclude '.git*' --exclude '.github' --exclude 'test' \
            --exclude 'package.json' --exclude 'README.md' --exclude 'dist' \
            ./ dist/
      - name: Ensure Pages project exists
        run: npx wrangler@3 pages project create top-eleven-manager --production-branch=main 2>/dev/null || true
      - name: Deploy
        run: npx wrangler@3 pages deploy dist --project-name=top-eleven-manager --branch=main
